# ── FUENTES DE NOTICIAS ───────────────────────────────────────────────────────
# IMPORTANTE: estas fuentes son para detectar actividad cuántica en LatAm
# (anuncios de cursos, programas nuevos, papers de grupos latinoamericanos).
# NO se incluyen en dataset_high_confidence.csv, solo en dataset_full.csv.
news_sources:
  - name: arXiv quant-ph
    type: rss
    url: https://arxiv.org/rss/quant-ph
    language: en

# ── SOCIAL (requiere tokens) ───────────────────────────────────────────────────
social_sources:
  - name: Twitter quantum latam
    type: twitter
    queries:
      - "computacion cuantica universidad latam"
      - "quantum computing universidad"
    language: es

  - name: Reddit quantum
    type: reddit
    subreddits:
      - QuantumComputing
    queries:
      - "quantum course latin america"
    language: en