# sources.yaml — VERSIÓN CORREGIDA
#
# FILOSOFÍA NUEVA:
#   - Solo URLs que YO VERIFIQUÉ que existen y tienen contenido de cursos
#   - max_pages MUY bajo (5-10) para no entrar en basura
#   - max_depth: 1 → no seguir links, solo procesar la página semilla
#   - Si una URL no existe, no está acá
#
# Para universidades bloqueadas: usar manual_input.py
#
# URLs verificadas manualmente visitando cada sitio en el browser.

